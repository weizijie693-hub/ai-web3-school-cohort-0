<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI × Web3 Concept Explainer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", "Noto Sans SC", sans-serif;
  background: #f5f5f7;
  color: #1d1d1f;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: white;
  padding: 32px 20px;
  text-align: center;
}
header h1 { font-size: 24px; margin-bottom: 6px; }
header p { font-size: 14px; opacity: 0.8; }
nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 16px 20px;
  background: white;
  border-bottom: 1px solid #e5e5ea;
  flex-wrap: wrap;
}
nav button {
  padding: 8px 20px;
  border: 1px solid #d2d2d7;
  border-radius: 20px;
  background: white;
  color: #1d1d1f;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
nav button:hover { background: #f5f5f7; border-color: #0071e3; color: #0071e3; }
nav button.active { background: #0071e3; border-color: #0071e3; color: white; }
.container { max-width: 720px; margin: 0 auto; padding: 20px; }
.section { display: none; }
.section.active { display: block; }

/* list */
.concept-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-top: 16px;
}
.concept-card {
  padding: 14px 16px;
  background: white;
  border-radius: 12px;
  border: 1px solid #e5e5ea;
  cursor: pointer;
  transition: all 0.2s;
}
.concept-card:hover { border-color: #0071e3; box-shadow: 0 2px 8px rgba(0,113,227,0.1); }
.concept-card .cn { font-size: 15px; font-weight: 600; }
.concept-card .en { font-size: 12px; color: #86868b; margin-top: 2px; }
.concept-card .key { font-size: 11px; color: #0071e3; margin-top: 4px; font-family: monospace; }

/* search */
.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  padding: 10px 16px;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  font-size: 15px;
  outline: none;
}
.search-box input:focus { border-color: #0071e3; }
.search-box button {
  padding: 10px 24px;
  background: #0071e3;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}
.search-box button:hover { background: #0060c9; }

/* explain card */
.explain-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #e5e5ea;
  overflow: hidden;
  animation: fadeIn 0.3s;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.explain-header {
  background: linear-gradient(135deg, #f8f9fa, #e9ecef);
  padding: 20px 24px;
  border-bottom: 1px solid #e5e5ea;
}
.explain-header h2 { font-size: 20px; }
.explain-header .en { font-size: 13px; color: #86868b; margin-top: 2px; }
.explain-body { padding: 20px 24px; }
.explain-section { margin-bottom: 20px; }
.explain-section:last-child { margin-bottom: 0; }
.explain-section .label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.explain-section .label.one { color: #0071e3; }
.explain-section .label.example { color: #34c759; }
.explain-section .label.mis { color: #ff9500; }
.explain-section .content { font-size: 15px; line-height: 1.7; color: #1d1d1f; }
.not-found { text-align: center; padding: 40px; color: #86868b; }

/* quiz */
.quiz-progress { font-size: 13px; color: #86868b; margin-bottom: 12px; }
.quiz-card {
  background: white;
  border-radius: 16px;
  border: 1px solid #e5e5ea;
  padding: 24px;
}
.quiz-question .concept-name { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.quiz-question .q-type { font-size: 13px; color: #86868b; margin-bottom: 16px; }
.quiz-question .q-text {
  font-size: 15px;
  line-height: 1.7;
  padding: 16px;
  background: #f5f5f7;
  border-radius: 10px;
  margin-bottom: 16px;
}
.quiz-option {
  display: block;
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 8px;
  border: 1px solid #d2d2d7;
  border-radius: 10px;
  background: white;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s;
  line-height: 1.5;
}
.quiz-option:hover { border-color: #0071e3; background: #f0f7ff; }
.quiz-option.selected { border-color: #0071e3; background: #e8f2fd; }
.quiz-option.correct { border-color: #34c759; background: #e8f8ed; }
.quiz-option.wrong { border-color: #ff3b30; background: #fff0ef; }
.quiz-option:disabled { cursor: default; }
.quiz-result {
  text-align: center;
  padding: 40px 20px;
  animation: fadeIn 0.3s;
}
.quiz-result .score {
  font-size: 48px;
  font-weight: 700;
  color: #0071e3;
}
.quiz-result .score-label { font-size: 16px; color: #86868b; margin-top: 4px; }
.quiz-next-btn {
  display: inline-block;
  margin-top: 16px;
  padding: 10px 32px;
  background: #0071e3;
  color: white;
  border: none;
  border-radius: 20px;
  font-size: 14px;
  cursor: pointer;
}
.quiz-next-btn:hover { background: #0060c9; }

/* random */
.random-btn-wrap { text-align: center; margin-bottom: 20px; }
.random-btn {
  padding: 12px 40px;
  background: #0071e3;
  color: white;
  border: none;
  border-radius: 24px;
  font-size: 16px;
  cursor: pointer;
}
.random-btn:hover { background: #0060c9; }

/* badge */
.badge-ai {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: #e8f2fd;
  color: #0071e3;
}
.badge-human {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: #e8f8ed;
  color: #34c759;
}
.attribution {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
  text-align: center;
  font-size: 13px;
  color: #86868b;
  line-height: 1.8;
}
</style>
</head>
<body>

<header>
  <h1>AI × Web3 Concept Explainer</h1>
  <p>Interactive learning tool — 11 core concepts</p>
</header>

<nav id="nav">
  <button class="active" data-section="list">📋 概念列表</button>
  <button data-section="explain">🔍 查询概念</button>
  <button data-section="random">🎲 随机学习</button>
  <button data-section="quiz">✏️ 小测验</button>
</nav>

<div class="container">

  <!-- Section: List -->
  <div id="section-list" class="section active">
    <p style="color:#86868b;font-size:14px;">点击任意概念查看详细解释</p>
    <div class="concept-grid" id="conceptGrid"></div>
  </div>

  <!-- Section: Explain -->
  <div id="section-explain" class="section">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入概念关键词，如 agent、blockchain、llm..." onkeydown="if(event.key==='Enter')doSearch()">
      <button onclick="doSearch()">搜索</button>
    </div>
    <div id="explainResult"></div>
  </div>

  <!-- Section: Random -->
  <div id="section-random" class="section">
    <div class="random-btn-wrap">
      <button class="random-btn" onclick="showRandom()">🎲 随机看一个概念</button>
    </div>
    <div id="randomResult"></div>
  </div>

  <!-- Section: Quiz -->
  <div id="section-quiz" class="section">
    <div id="quizArea"></div>
  </div>

</div>

<div class="attribution">
  <span class="badge-ai">AI-assisted</span> 概念内容由 AI 生成初稿，人工审校 ·
  <span class="badge-human">Human-verified</span> 代码与交互经手动调试<br>
  概念来源：<a href="https://aiweb3.school/zh/handbook/" target="_blank">AI × Web3 School Handbook</a>
</div>

<script>
// ===== DATA =====
const CONCEPTS = {
  "llm": {
    "name": "大型语言模型 (LLM)",
    "name_en": "Large Language Model",
    "one_line": "大型语言模型是一种基于海量文本数据训练而成的深度学习模型，能够根据输入的文本预测并生成连贯、上下文相关的自然语言输出。",
    "example": "当你用 ChatGPT 写一封邮件，开头输入\"尊敬的张总，关于上周我们讨论的合作方案\"，模型会根据它从训练数据中学到的语言模式和知识，自动补写出得体、通顺的后续内容，而不需要你逐字逐句地写。",
    "misconception": "很多人误以为 LLM 是一个\"知识库\"或\"搜索引擎\"，实际上它并不存储事实，而是根据统计规律生成最可能的下文——这意味着它可能自信地编造出不存在的信息（即\"幻觉\"）。在做事实核查或引用具体数据时，必须验证模型的输出，不能直接采信。"
  },
  "prompt": {
    "name": "提示 (Prompt)",
    "name_en": "Prompt",
    "one_line": "提示是用户输入给 AI 模型的指令或问题，是人与模型进行交互和引导其输出的主要方式，决定了模型的行为方向和输出质量。",
    "example": "在 Cursor 中写\"用 React 写一个带搜索功能的用户列表组件，数据从 useUsers hook 获取\"——这段自然语言描述就是一个 prompt，它告诉 AI 你想要什么功能、用什么技术栈、有什么约束条件。",
    "misconception": "有人认为 prompt 是\"魔法咒语\"，需要特定的神秘措辞才能生效。实际上，prompt 的本质是用清晰、具体的语言表达需求。好的 prompt 靠的是明确的上下文、约束条件和输出格式，而不是花哨的模板或所谓的\"触发词\"。"
  },
  "context-window": {
    "name": "上下文窗口 (Context Window)",
    "name_en": "Context Window",
    "one_line": "上下文窗口是模型在一次请求中能\"看到\"或\"参考\"的输入文本总量，决定了它在生成回复时可利用的信息上限。",
    "example": "当你把整个项目的代码库粘贴到 Claude 的对话框中并询问\"这个 bug 在哪\"，如果粘贴的内容加上你的问题超过了上下文窗口限制，模型就会\"忘记\"最早输入的部分代码，导致回答遗漏关键信息。",
    "misconception": "许多人把上下文窗口当作\"模型能记住的总信息量\"，但它更像一个工作台面——所有信息只在当前对话中使用，对话结束后模型不会保留任何\"记忆\"。此外，填满上下文窗口不一定更好：过多的无关信息会稀释模型对关键内容的注意力，降低输出质量。"
  },
  "agent": {
    "name": "智能体 / Agent",
    "name_en": "AI Agent",
    "one_line": "智能体是一个能够自主感知环境、做出决策并采取行动来达成目标的 AI 系统，而不仅仅是被动地回答单个问题。",
    "example": "一个代码审查 Agent 可以自动 checkout PR 分支、运行静态分析、调用 LLM 逐文件审查代码变更、在 PR 上留下逐条评论，并在发现严重问题时重新触发 CI——它全程自主决策，不需要人类逐一下达指令。",
    "misconception": "初学者常把\"调 API 的脚本\"和 Agent 混为一谈。Agent 的核心是具备自主推理和规划能力：它能在未知情况下降级处理、根据中间结果灵活调整策略。单纯的条件分支编排不属于 Agent，只是自动化脚本。"
  },
  "tool-use": {
    "name": "工具使用 (Tool Use)",
    "name_en": "Tool Use",
    "one_line": "工具使用是指 AI 模型能够调用外部函数或 API（如执行代码、查询数据库、搜索网页）来获取信息或执行操作，从而突破自身纯文本生成能力的限制。",
    "example": "当 AI 编程助手需要读取你的项目文件时，它并不是\"凭空知道\"文件内容——它通过调用 read_file 工具来获取。这就是 tool use：模型负责决定何时调用哪个工具以及传什么参数，工具负责执行并返回结果给模型做下一步推理。",
    "misconception": "有人误认为 tool use 是模型\"学会\"了操作数据库或发送网络请求。实际上，模型只是学会了决定\"应该调用哪个工具和传什么参数\"，工具的实际执行由外部运行时完成，模型自己并不具备这些能力。此外，模型不会持久化工具调用的结果，每次对话都需要重新获取。"
  },
  "blockchain": {
    "name": "区块链网络",
    "name_en": "Blockchain Network",
    "one_line": "区块链网络的核心不是\"存数据\"，而是让互不信任的参与者对状态变化达成一致，通过共识机制维护一个公开、不可篡改的分布式账本。",
    "example": "当你用 MetaMask 在 Ethereum 上发送 1 ETH 给朋友时，这笔交易不会立即完成——它先进入 Mempool（交易池）等待矿工/验证者打包，经过共识确认后记录在区块中，最终在区块浏览器上可见。整个过程不依赖任何中央机构。",
    "misconception": "很多人以为区块链是\"存数据\"的数据库。实际上，区块链的核心是\"状态共识机\"——它的价值不在于存储效率（比数据库慢得多），而在于让互不信任的参与者对\"当前状态是什么\"达成一致。适合存需要多方信任的关键数据，不适合存大量原始数据。"
  },
  "pos": {
    "name": "权益证明 (PoS)",
    "name_en": "Proof of Stake",
    "one_line": "权益证明是一种共识机制，验证者通过质押（stake）ETH 等代币来获得提议和证明新区块的资格，网络安全由经济质押和协议惩罚（Slashing）来保证。",
    "example": "Ethereum 的验证者需要质押至少 32 ETH 才能参与出块。如果验证者诚实工作，获得区块奖励和手续费；如果作恶（如同时提议两个冲突区块），质押的 ETH 会被协议罚没（Slash）。这就像交一笔押金来获得工作资格，作弊就没收押金。",
    "misconception": "有人误认为 PoS 是\"持有越多权力越大\"的垄断系统。实际上，Ethereum PoS 通过随机选取验证者、分布式客户端实现和协议内惩罚机制来防止中心化控制。拥有更多 ETH 确实能提高被选中的概率，但不能直接控制网络。"
  },
  "l2": {
    "name": "二层网络 (L2)",
    "name_en": "Layer 2",
    "one_line": "二层网络是在主区块链（L1）之上构建的扩展方案，将大量交易在链下执行后把结果或证明提交回 L1，从而降低费用并提高交易吞吐量。",
    "example": "在 Ethereum L1 上转账一次可能花费 $5-50 且需要等待区块确认，但通过 Arbitrum 或 Optimism 等 L2，同样的转账成本降至 $0.01-0.50，确认也更快。用户只需将资产通过跨链桥存入 L2 即可开始使用。",
    "misconception": "很多人以为 L2 是独立的区块链。实际上，L2 的安全性最终依赖于 L1——它定期向 L1 提交数据或证明，L1 作为\"仲裁者\"保证 L2 上的交易可以被挑战和验证。但如果跨链桥本身被攻击，用户在 L2 上的资产仍然可能面临风险。"
  },
  "rollup": {
    "name": "Rollup",
    "name_en": "Rollup",
    "one_line": "Rollup 是目前主流的 L2 扩展方案，将交易执行移到链下，然后将交易数据或有效性证明提交到 L1，在保持安全性的同时大大降低成本。",
    "example": "Optimistic Rollup（如 Optimism）默认假设所有交易都是诚实的，但有 7 天的挑战期——如果有人发现欺诈可以提交证明。ZK Rollup（如 zkSync）则直接为每批交易生成零知识证明，L1 只需验证证明即可确认所有交易有效，无需挑战期。",
    "misconception": "常有人把 Rollup 和侧链（Sidechain）混为一谈。关键区别：Rollup 的安全性继承自 L1（L1 可以强制 Rollup 上的操作），而侧链有自己的共识机制和安全模型。如果侧链被攻击，L1 无法恢复侧链上的资产。"
  },
  "hitl": {
    "name": "人在环中 (Human-in-the-Loop)",
    "name_en": "Human-in-the-Loop (HITL)",
    "one_line": "人在环中是指在 AI 系统的决策流程中保留人类介入环节，让人类对关键操作进行确认、审核或修正，而不是让 AI 全自动运行。",
    "example": "一个 AI 邮件起草工具生成了一封回复客户的邮件，但它不会直接发送——而是将草稿展示在界面上，等你点击\"确认发送\"后才真正发出。这就是 HITL：AI 负责效率（快速起草），人类把控最终决策权（确认内容合适）。",
    "misconception": "HITL 不等于\"每个微不足道的操作都要人点头\"。如果 AI 每走一步都弹窗让人批准，那就失去了使用 AI 的意义。好的 HITL 设计需要识别哪些步骤风险高或需要人类判断力（如确认对外发送的内容、批准金融交易），哪些步骤可以全自动（如内部数据格式化）。"
  },
  "smart-contract": {
    "name": "智能合约",
    "name_en": "Smart Contract",
    "one_line": "智能合约是部署在区块链上的可执行代码，在满足预设条件时自动执行，其结果公开透明且不可篡改。",
    "example": "一个简单的众筹智能合约：设定目标金额和截止日期。如果到期前筹款达到目标，合约自动将资金转给项目方；如果未达标，合约自动将资金退回给每一位支持者。整个过程不需要人工干预或信任第三方。",
    "misconception": "\"智能合约\"这个名称中的\"智能\"常被误解——它并不具备 AI 意义上的\"智能\"。智能合约只是\"if-this-then-that\"的确定性程序，所有逻辑在部署时已固定，不能像 AI 一样学习和适应。它的\"智能\"体现在自动执行和不可篡改，而非\"会思考\"。"
  }
};

// ===== NAV =====
document.querySelectorAll('#nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + btn.dataset.section).classList.add('active');
  });
});

// ===== LIST =====
function renderList() {
  const grid = document.getElementById('conceptGrid');
  grid.innerHTML = '';
  const keys = Object.keys(CONCEPTS).sort();
  keys.forEach(key => {
    const c = CONCEPTS[key];
    const card = document.createElement('div');
    card.className = 'concept-card';
    card.innerHTML = `<div class="cn">${c.name}</div><div class="en">${c.name_en}</div><div class="key">${key}</div>`;
    card.onclick = () => {
      showExplain(key);
      document.querySelector('#nav button[data-section="explain"]').click();
    };
    grid.appendChild(card);
  });
}
renderList();

// ===== EXPLAIN =====
function renderExplain(key) {
  const c = CONCEPTS[key];
  if (!c) return '<div class="not-found">未找到该概念</div>';
  return `
    <div class="explain-card">
      <div class="explain-header">
        <h2>${c.name}</h2>
        <div class="en">${c.name_en}</div>
      </div>
      <div class="explain-body">
        <div class="explain-section">
          <div class="label one">>> 一句话解释 <span class="badge-ai">AI-assisted</span></div>
          <div class="content">${c.one_line}</div>
        </div>
        <div class="explain-section">
          <div class="label example">>> 具体例子 <span class="badge-ai">AI-assisted</span> <span class="badge-human">Human-verified</span></div>
          <div class="content">${c.example}</div>
        </div>
        <div class="explain-section">
          <div class="label mis">>> 常见误解 <span class="badge-ai">AI-assisted</span> <span class="badge-human">Human-verified</span></div>
          <div class="content">${c.misconception}</div>
        </div>
      </div>
    </div>`;
}

function showExplain(key) {
  document.getElementById('explainResult').innerHTML = renderExplain(key);
  document.getElementById('searchInput').value = key;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return;

  if (CONCEPTS[q]) {
    showExplain(q);
    return;
  }

  const matches = [];
  for (const [key, c] of Object.entries(CONCEPTS)) {
    if (key.includes(q) || c.name.includes(q) || c.name_en.toLowerCase().includes(q)) {
      matches.push(key);
    }
  }

  if (matches.length === 0) {
    document.getElementById('explainResult').innerHTML = '<div class="not-found">未找到匹配的概念</div>';
  } else if (matches.length === 1) {
    showExplain(matches[0]);
  } else {
    document.getElementById('explainResult').innerHTML = `
      <p style="color:#86868b;margin-bottom:12px;">找到多个匹配概念：</p>
      <div class="concept-grid">${matches.map(k => {
        const c = CONCEPTS[k];
        return `<div class="concept-card" onclick="showExplain('${k}')"><div class="cn">${c.name}</div><div class="key">${k}</div></div>`;
      }).join('')}</div>`;
  }
}

// ===== RANDOM =====
function showRandom() {
  const keys = Object.keys(CONCEPTS);
  const key = keys[Math.floor(Math.random() * keys.length)];
  document.getElementById('randomResult').innerHTML = renderExplain(key);
}

// ===== QUIZ =====
let quizState = { keys: [], index: 0, score: 0, answered: false };

function initQuiz() {
  quizState.keys = Object.keys(CONCEPTS).sort(() => Math.random() - 0.5);
  quizState.index = 0;
  quizState.score = 0;
  quizState.answered = false;
  renderQuiz();
}

function renderQuiz() {
  const area = document.getElementById('quizArea');
  const { keys, index, score } = quizState;
  if (index >= 5 || index >= keys.length) {
    area.innerHTML = `
      <div class="quiz-result">
        <div class="score">${score} / ${Math.min(5, keys.length)}</div>
        <div class="score-label">测验完成！</div>
        <button class="quiz-next-btn" onclick="initQuiz()">重新测验</button>
      </div>`;
    return;
  }

  const key = keys[index];
  const c = CONCEPTS[key];
  const types = ['one_line', 'example', 'misconception'];
  const qType = types[Math.floor(Math.random() * types.length)];
  const typeLabels = { one_line: '一句话解释', example: '具体例子', misconception: '常见误解' };

  const wrongKey = keys.find(k => k !== key);
  const wrong = CONCEPTS[wrongKey];

  const options = [
    { text: c[qType], correct: true },
    { text: wrong[qType], correct: false }
  ].sort(() => Math.random() - 0.5);

  quizState.current = { key, qType, options };

  area.innerHTML = `
    <div class="quiz-progress">第 ${index + 1} / ${Math.min(5, keys.length)} 题 · 当前得分: ${score}</div>
    <div class="quiz-card">
      <div class="quiz-question">
        <div class="concept-name">${c.name}</div>
        <div class="q-type">以下哪项是它的「${typeLabels[qType]}」？</div>
        <div class="q-text">${c[qType].substring(0, 80)}...</div>
        ${options.map((opt, i) =>
          `<button class="quiz-option" data-idx="${i}" onclick="answerQuiz(${i})">${opt.text.substring(0, 100)}...</button>`
        ).join('')}
      </div>
    </div>`;
}

function answerQuiz(idx) {
  if (quizState.answered) return;
  quizState.answered = true;

  const { options, key, qType } = quizState.current;
  const buttons = document.querySelectorAll('.quiz-option');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    if (options[i].correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });

  if (options[idx].correct) quizState.score++;

  setTimeout(() => {
    quizState.index++;
    quizState.answered = false;
    renderQuiz();
  }, 1500);
}

// Start
initQuiz();
</script>
</body>
</html>
